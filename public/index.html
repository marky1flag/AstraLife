<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AstraLife — AI Life Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --bg: #07090d;
  --panel: #0d1017;
  --panel2: #12161f;
  --panel3: #171c28;
  --border: #1e2433;
  --border2: #2a3245;
  --cyan: #4ee8e0;
  --cyan-dim: #2a8a86;
  --pink: #f06ab8;
  --green: #5ae87a;
  --amber: #f0c04a;
  --red: #f0604a;
  --blue: #5a9af0;
  --purple: #a06af0;
  --text: #d8e0ea;
  --text2: #7a8698;
  --text3: #454e60;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', 'Consolas', monospace;
  min-height: 100vh;
  font-size: 13px;
}
.wrap {
  max-width: 1560px;
  margin: 0 auto;
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: auto 1fr auto;
  gap: 12px;
}

/* ═══ HEADER ═══ */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 18px;
  flex-wrap: wrap;
}
.logo {
  font-size: 21px;
  font-weight: bold;
  color: var(--cyan);
  letter-spacing: 3px;
  text-shadow: 0 0 12px rgba(78,232,224,0.5);
}
.ver { font-size: 11px; color: var(--text3); }
.pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
}
.pill b { color: var(--text); letter-spacing: 1px; }
.hgroup { display: flex; align-items: center; gap: 0; }
.hstat {
  padding: 4px 16px;
  border-left: 1px solid var(--border);
  text-align: center;
}
.hstat:first-child { border-left: none; }
.hstat .hlabel { font-size: 9.5px; color: var(--text2); letter-spacing: 1.5px; }
.hstat .hval { font-size: 14px; font-weight: bold; color: var(--text); margin-top: 1px; }
.hstat .hval.cyan { color: var(--cyan); }
.hstat .hval.amber { color: var(--amber); }
.bar-seg { display: inline-flex; gap: 2px; margin-left: 5px; vertical-align: 1px; }
.seg { width: 6px; height: 9px; border-radius: 1px; background: var(--border2); }
.seg.on.cyan { background: var(--cyan); box-shadow: 0 0 4px var(--cyan); }
.seg.on.amber { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
.spacer { flex: 1; }
.cbtn {
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel2);
  color: var(--cyan);
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
}
.cbtn:hover { border-color: var(--cyan-dim); background: var(--panel3); }
.cbtn.active { border-color: var(--cyan); box-shadow: 0 0 8px rgba(78,232,224,0.3); }
.speed-tag {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel2);
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text);
}

/* ═══ MAIN / CANVAS ═══ */
.main { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.map-wrap {
  position: relative;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: #05060a;
}
#officeCanvas {
  display: block;
  width: 100%;
  image-rendering: pixelated;
}
.status-bar {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: rgba(5,6,10,0.9);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 5px 11px;
  font-size: 11px;
  color: var(--cyan);
  max-width: 55%;
}
.inject-row { display: flex; gap: 8px; }
.inject-input {
  flex: 1;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  outline: none;
}
.inject-input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 8px rgba(78,232,224,0.1); }
.inject-input::placeholder { color: var(--text3); }
.btn {
  background: linear-gradient(180deg, #1a4a48, #12332f);
  border: 1px solid var(--cyan-dim);
  border-radius: 8px;
  padding: 9px 18px;
  color: var(--cyan);
  font-size: 12px;
  font-weight: bold;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 1px;
}
.btn:hover { box-shadow: 0 0 12px rgba(78,232,224,0.25); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn.outline { background: var(--panel2); border-color: var(--border); color: var(--text2); }
.btn.outline:hover { color: var(--text); border-color: var(--border2); box-shadow: none; }
.btn.ai-on { background: linear-gradient(180deg, #1a4a2a, #12331a); border-color: var(--green); color: var(--green); }
#aiStatus {
  display: none;
  font-size: 11px;
  color: var(--text2);
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
}

/* ═══ SIDEBAR ═══ */
.sidebar { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}
.panel-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--cyan);
  font-weight: bold;
  margin-bottom: 10px;
}
.panel-label::before { content: '✦ '; }
.agent-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(30,36,51,0.6);
}
.agent-row:last-child { border-bottom: none; }
.agent-face {
  width: 34px; height: 34px;
  border-radius: 6px;
  flex: none;
  image-rendering: pixelated;
}
.ar-body { flex: 1; min-width: 0; }
.ar-name { font-size: 12.5px; font-weight: bold; color: var(--text); }
.ar-status { font-size: 10.5px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ar-barwrap { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
.ar-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.ar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 1s; box-shadow: 0 0 4px var(--green); }
.ar-pct { font-size: 10px; color: var(--text2); width: 30px; text-align: right; }

#logBox { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column-reverse; }
.log-line { padding: 3.5px 0; font-size: 11px; line-height: 1.5; border-bottom: 1px solid rgba(30,36,51,0.4); }
.log-time { color: var(--cyan); }
.log-name { font-weight: bold; }

/* ═══ FOOTER ═══ */
.footer {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 20px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 12px;
  flex-wrap: wrap;
}
.flabel { color: var(--text2); letter-spacing: 2px; font-size: 11px; }
.fval { color: var(--text); font-weight: bold; letter-spacing: 1px; }
.fval.good { color: var(--green); text-shadow: 0 0 8px rgba(90,232,122,0.4); }
.fval.gold { color: var(--amber); }

/* TOASTS */
#toasts { position: fixed; top: 14px; right: 14px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 13px;
  font-size: 11px;
  color: var(--text2);
  max-width: 260px;
  animation: toastIn 0.3s;
}
.toast.amber { border-color: var(--amber); color: var(--amber); }
.toast.cyan { border-color: var(--cyan); color: var(--cyan); }
@keyframes toastIn { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:translateX(0); } }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div id="toasts"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div>
      <span class="logo">ASTRALIFE</span>
      <span class="ver">v0.8.0</span>
    </div>
    <div class="pill">
      <span>📅 <b>DAY <span id="dayOut">1</span></b></span>
      <span>🕐 <b id="timeOut">08:00</b></span>
      <span id="dayIcon">☀️</span>
    </div>
    <div class="hgroup">
      <div class="hstat"><div class="hlabel">AGENTS</div><div class="hval" id="hAgents">6/10</div></div>
      <div class="hstat"><div class="hlabel">TASKS</div><div class="hval" id="hTasks">0</div></div>
      <div class="hstat"><div class="hlabel">GPU</div><div class="hval cyan"><span id="hGpu">82</span>%<span class="bar-seg" id="gpuSeg"></span></div></div>
      <div class="hstat"><div class="hlabel">⚡ POWER</div><div class="hval amber"><span id="hPower">93</span>%<span class="bar-seg" id="powerSeg"></span></div></div>
    </div>
    <div class="spacer"></div>
    <button class="cbtn" id="pauseBtn">⏸</button>
    <button class="cbtn active" id="playBtn">▶</button>
    <button class="cbtn" id="speedBtn">⏩</button>
    <span class="speed-tag" id="speedTag">1×</span>
    <button class="btn outline" id="aiModeBtn">🧠 Use real AI</button>
    <button class="btn outline" id="resetBtn">↺</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="map-wrap">
      <canvas id="officeCanvas" width="1120" height="640"></canvas>
      <div class="status-bar" id="statusBar">[BOOT] Initializing AstraLife world...</div>
    </div>
    <div class="inject-row">
      <input class="inject-input" id="eventInput" type="text" placeholder="⚡ INJECT EVENT — e.g. the wifi goes down, pizza arrives, a mysterious package appears...">
      <button class="btn" id="eventBtn">INJECT</button>
    </div>
    <div id="aiStatus"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="panel">
      <div class="panel-label">AGENTS</div>
      <div id="agentList"></div>
    </div>
    <div class="panel" style="flex:1;">
      <div class="panel-label">LIVE LOGS</div>
      <div id="logBox"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span><span class="flabel">GLOBAL STATUS</span> <span class="fval good" id="fStatus">😊 GOOD</span></span>
    <span><span class="flabel">SYSTEM UPTIME</span> <span class="fval" id="fUptime">0D 0H</span></span>
    <span><span class="flabel">CREDITS</span> <span class="fval gold">🪙 <span id="fCredits">12,450</span></span></span>
    <div class="spacer"></div>
    <span style="color:var(--text3);font-size:11px;">AstraLife — AI agents living their pixel lives</span>
  </div>

</div>

<script>
// ═══════════════ AGENTS ═══════════════
var AGENT_DEFS = [
  { name:'Ivy',   role:'Boss',     hair:'#f06ab8', body:'#c04a90', skin:'#f0c8a8', goal:'Keep the studio thriving',        home:'Astra Office', status:'Settling in' },
  { name:'Nala',  role:'Designer', hair:'#5ae87a', body:'#2a9a4a', skin:'#e8b890', goal:'Finish the landing page mockup',  home:'Dev Corner',   status:'Building agent' },
  { name:'Bapu',  role:'Barista',  hair:'#3a2a1a', body:'#f0c04a', skin:'#c89060', goal:'Keep everyone caffeinated',        home:'Breakroom',    status:'Taking a break' },
  { name:'Mochi', role:'Pet',      hair:'#e8934a', body:'#e8934a', skin:'#f8e8d0', goal:'Nap in every warm spot',           home:'Lounge',       status:'Sleeping' },
  { name:'Astra', role:'AI Core',  hair:'#4ee8e0', body:'#3a5a8a', skin:'#8ab0d8', goal:'Analyze all incoming data',        home:'Server Room',  status:'Analyzing data' },
  { name:'Lux',   role:'Intern',   hair:'#a06af0', body:'#6a4ab0', skin:'#e8c8b0', goal:'Learn everything, break nothing',  home:'Bedroom',      status:'Idle' }
];

// canvas 1120x640 = 70x40 tiles of 16px
var ROOMS = {
  'Astra Office': { x: 16,  y: 16,  w: 352, h: 288, label:'ASTRA OFFICE', icon:'🏢' },
  'Dev Corner':   { x: 384, y: 16,  w: 352, h: 288, label:'DEV CORNER',   icon:'💻' },
  'Server Room':  { x: 752, y: 16,  w: 352, h: 288, label:'SERVER ROOM',  icon:'🖥️' },
  'Breakroom':    { x: 16,  y: 336, w: 352, h: 288, label:'BREAKROOM',    icon:'☕' },
  'Lounge':       { x: 384, y: 336, w: 352, h: 288, label:'LOUNGE',       icon:'🛋️' },
  'Bedroom':      { x: 752, y: 336, w: 352, h: 288, label:'BEDROOM',      icon:'🛏️' }
};
var LOC_KEYS = Object.keys(ROOMS);
function roomCenter(n){ var r=ROOMS[n]; return {x:r.x+r.w/2, y:r.y+r.h/2+40}; }

// ═══════════════ STATE ═══════════════
var state = { agents:[], day:1, hour:8, tasks:0, gpu:82, power:93, credits:12450, happiness:90, log:[], playing:true, speed:1, pendingEvent:null };
var aiMode=false, aiBusy=false, timer=null;

function makeAgent(def){
  var c = roomCenter(def.home);
  return { name:def.name, role:def.role, hair:def.hair, body:def.body, skin:def.skin,
    loc:def.home, goal:def.goal, mood:60+Math.floor(Math.random()*35),
    x:c.x+(Math.random()-0.5)*60, y:c.y+(Math.random()-0.5)*40, tx:0, ty:0,
    bubble:null, bubbleTimer:0, walkPhase:Math.random()*10,
    memory:[def.name+' came online.'], relationships:{}, currentAction:def.status };
}

function reset(){
  state.agents = AGENT_DEFS.map(makeAgent);
  state.agents.forEach(function(a){ a.tx=a.x; a.ty=a.y; state.agents.forEach(function(b){ if(a!==b) a.relationships[b.name]=0; }); });
  state.day=1; state.hour=8; state.tasks=0; state.gpu=82; state.power=93; state.credits=12450; state.happiness=90;
  state.log=[]; state.pendingEvent=null;
  pushLog('System','#4ee8e0','world initialized — day 1');
  renderAll();
}

// ═══════════════ ACTIONS ═══════════════
var SOLO = {
  Boss:     [['started new task: Research Memory System','📋'],['reviewed the sprint board','📊'],['approved a budget line','✅'],['answered investor emails','📧'],['stared at the city lights, thinking','🌃']],
  Designer: [['committed code (fix: agent sync bug)','💾'],['redesigned the dashboard grid','🎨'],['pushed new UI components','🧩'],['fought the CSS and won','⚔️'],['exported the new icon set','📁']],
  Barista:  [['is making coffee','☕'],['restocked the vending machine','🥤'],['cleaned the espresso machine','🧽'],['invented a triple-shot latte','🥛'],['organized the snack shelf','🍪']],
  Pet:      [['is sleeping','💤'],['purrrs on the warm server','😸'],['knocked a mug off the table','😼'],['stares into the aquarium','🐟'],['demands attention loudly','🙀']],
  'AI Core':[['analyzing dataset (Network Traffic #42)','📡'],['optimized the model weights','🧮'],['ran 4,096 simulations','🌀'],['defragmented its own memory','🧠'],['detected an anomaly, then ignored it','👁️']],
  Intern:   [['is idle','😶'],['read the onboarding docs again','📖'],['accidentally deployed to production','😱'],['fixed the printer somehow','🖨️'],['took notes on everything','📝']]
};
var SOCIAL = [
  ['shares coffee with', 2, '☕'], ['pair-programs with', 2, '💻'], ['gossips with', 1, '💬'],
  ['has a heated code review with', -2, '⚔️'], ['compliments', 2, '🌟'], ['steals the snack of', -3, '🍪'],
  ['helps debug for', 2, '🤝'], ['disagrees about fonts with', -1, '🔤']
];

function relWord(v){ if(v>=6)return 'Bestie'; if(v>=2)return 'Friend'; if(v<=-4)return 'Rival'; if(v<=-1)return 'Tense'; return 'Neutral'; }
function speak(a,t,d){ a.bubble=t; a.bubbleTimer=d||100; }
function moveAgentTo(a,room){
  a.loc=room;
  var c=roomCenter(room);
  var i=state.agents.indexOf(a);
  var ang=(i/state.agents.length)*Math.PI*2;
  a.tx=c.x+Math.cos(ang)*45+(Math.random()-0.5)*30;
  a.ty=c.y+Math.sin(ang)*30+(Math.random()-0.5)*20;
}

function tick(){
  state.hour+=1+Math.floor(Math.random()*2);
  if(state.hour>=24){ state.hour-=24; state.day++; pushLog('System','#4ee8e0','day '+state.day+' begins'); }

  state.gpu=Math.max(20,Math.min(99,state.gpu+Math.floor(Math.random()*13)-6));
  state.power=Math.max(30,Math.min(99,state.power+Math.floor(Math.random()*7)-3));

  var n=1+Math.floor(Math.random()*2);
  for(var i=0;i<n;i++){
    var a=state.agents[Math.floor(Math.random()*state.agents.length)];
    var roll=Math.random();
    if(roll<0.18){
      var dest=LOC_KEYS[Math.floor(Math.random()*LOC_KEYS.length)];
      if(a.role==='Pet'&&Math.random()<0.5) dest='Lounge';
      if(a.role==='AI Core'&&Math.random()<0.6) dest='Server Room';
      moveAgentTo(a,dest);
      a.currentAction='moving to '+dest;
      pushLog(a.name,a.hair,'heads to '+dest);
    } else if(roll<0.62){
      var acts=SOLO[a.role];
      var act=acts[Math.floor(Math.random()*acts.length)];
      a.currentAction=act[0];
      pushLog(a.name,a.hair,act[0]+' '+act[1]);
      speak(a,act[1],110);
      a.memory.push(act[0]); if(a.memory.length>4)a.memory.shift();
      a.mood=Math.max(20,Math.min(100,a.mood+2));
      if(a.role==='Designer'||a.role==='AI Core'){ state.tasks++; state.credits+=Math.floor(Math.random()*40); }
      if(a.role==='Boss') state.credits+=Math.floor(Math.random()*60)-20;
    } else {
      var others=state.agents.filter(function(b){return b!==a;});
      var b=others[Math.floor(Math.random()*others.length)];
      var s=SOCIAL[Math.floor(Math.random()*SOCIAL.length)];
      a.currentAction=s[0]+' '+b.name;
      pushLog(a.name,a.hair,s[0]+' '+b.name+' '+s[2]);
      speak(a,s[2],110);
      a.relationships[b.name]=(a.relationships[b.name]||0)+s[1];
      b.relationships[a.name]=(b.relationships[a.name]||0)+Math.round(s[1]*0.7);
      a.memory.push(s[0]+' '+b.name); if(a.memory.length>4)a.memory.shift();
      b.memory.push(a.name+' '+s[0]+' me'); if(b.memory.length>4)b.memory.shift();
      a.mood=Math.max(20,Math.min(100,a.mood+(s[1]>0?3:-3)));
      b.mood=Math.max(20,Math.min(100,b.mood+(s[1]>0?2:-2)));
      state.happiness=Math.max(0,Math.min(100,state.happiness+(s[1]>0?1:-1)));
    }
  }

  if(state.pendingEvent){
    pushLog('EVENT','#f0c04a',state.pendingEvent+' ⚡');
    toast('⚡ '+state.pendingEvent,'amber');
    state.agents.forEach(function(a){
      a.memory.push('Event: '+state.pendingEvent); if(a.memory.length>4)a.memory.shift();
      speak(a,'❗',90);
    });
    state.happiness=Math.max(0,state.happiness-4);
    state.pendingEvent=null;
  }

  var ra=state.agents[Math.floor(Math.random()*state.agents.length)];
  document.getElementById('statusBar').textContent='['+ra.role.toUpperCase()+'] '+ra.name+' — '+ra.currentAction;
  renderAll();
}

// ═══════════════ REAL AI TICK ═══════════════
function callAI(){
  if(aiBusy) return Promise.resolve();
  aiBusy=true;
  setStatus('🧠 Agents thinking (Claude AI)...');
  return fetch('/api/tick',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ agents:state.agents.map(function(a){ return {name:a.name,role:a.role,loc:a.loc,goal:a.goal,mood:a.mood,relationships:a.relationships,memory:a.memory}; }), locations:LOC_KEYS, day:state.day, worldEvent:state.pendingEvent })
  }).then(function(r){return r.json();}).then(function(res){
    if(res.error){ pushLog('AI','#f0604a','error: '+res.error); setStatus('AI error: '+res.error); return; }
    state.hour+=1+Math.floor(Math.random()*2);
    if(state.hour>=24){state.hour-=24;state.day++;}
    if(state.pendingEvent){ pushLog('EVENT','#f0c04a',state.pendingEvent+' ⚡'); toast('⚡ '+state.pendingEvent,'amber'); }
    (res.events||[]).forEach(function(ev){
      var a=state.agents.find(function(x){return x.name===ev.actor;});
      if(!a) return;
      if(ev.location&&LOC_KEYS.indexOf(ev.location)!==-1) moveAgentTo(a,ev.location);
      a.currentAction=ev.action;
      pushLog(a.name,a.hair,ev.action+' 💭');
      speak(a,'💭',110);
      a.memory.push(ev.action); if(a.memory.length>4)a.memory.shift();
      if(ev.target){
        var b=state.agents.find(function(x){return x.name===ev.target;});
        if(b){ var d=ev.relationship_delta||0;
          a.relationships[b.name]=(a.relationships[b.name]||0)+d;
          b.relationships[a.name]=(b.relationships[a.name]||0)+Math.round(d*0.7); }
      }
      a.mood=Math.max(10,Math.min(100,a.mood+(ev.mood_delta_actor||0)));
      if(ev.new_goal){ a.goal=ev.new_goal; pushLog(a.name,a.hair,'new goal: '+ev.new_goal+' 🎯'); }
    });
    state.pendingEvent=null;
    renderAll();
    setStatus('✓ Claude AI — day '+state.day);
  }).catch(function(e){ pushLog('AI','#f0604a','error: '+String(e.message||e)); setStatus('AI error: '+String(e.message||e));
  }).finally(function(){ aiBusy=false; });
}

var cv=document.getElementById('officeCanvas');
var ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
var frame=0;
var T=16;

// asset loading
var IMGS={}, assetsReady=false;
var ASSET_LIST={
  interiors:'assets/Interiors_free_16x16.png',

  Adam:'assets/Adam_run_16x16.png',

};
var CHAR_SHEET={ Ivy:'Amelia', Nala:'Adam', Bapu:'Alex', Lux:'Bob' };

(function loadAssets(){
  var keys=Object.keys(ASSET_LIST), left=keys.length;
  keys.forEach(function(k){
    var im=new Image();
    im.onload=function(){ if(--left===0){ assetsReady=true; buildMap(); } };
    im.onerror=function(){ if(--left===0){ assetsReady=true; buildMap(); } };
    im.src=ASSET_LIST[k];
    IMGS[k]=im;
  });
})();

// room tile config: wall(tx,ty of 2-row wall set), floor(tx,ty)

// glow points: [room, relPxX, relPxY, radius, r,g,b, alpha]
var GLOWS=[
  ['Astra Office',88,32,55,240,192,74,0.14],   // lamp
  ['Astra Office',208,42,45,240,140,60,0.12],  // fireplace
  ['Astra Office',160,110,30,120,170,240,0.10],// desk pc

  ['Server Room',248,60,50,78,232,224,0.08],

];

var mapCanvas=document.createElement('canvas');
mapCanvas.width=1120; mapCanvas.height=640;

function buildMap(){
  var m=mapCanvas.getContext('2d');
  m.imageSmoothingEnabled=false;
  m.fillStyle='#05060a'; m.fillRect(0,0,1120,640);
  if(!IMGS.rooms.complete||!IMGS.rooms.naturalWidth){ return; }
  LOC_KEYS.forEach(function(k){
    var r=ROOMS[k], t=ROOM_TILES[k];
    var tx=r.x/T, ty=r.y/T, tw=r.w/T, th=r.h/T;
    for(var cx=tx;cx<tx+tw;cx++){
      m.drawImage(IMGS.rooms,t.wall[0]*T,t.wall[1]*T,T,T,cx*T,ty*T,T,T);
      m.drawImage(IMGS.rooms,t.wall[0]*T,(t.wall[1]+1)*T,T,T,cx*T,(ty+1)*T,T,T);
    }
    for(var cy=ty+2;cy<ty+th;cy++)
      for(var cx2=tx;cx2<tx+tw;cx2++)
        m.drawImage(IMGS.rooms,t.floor[0]*T,t.floor[1]*T,T,T,cx2*T,cy*T,T,T);
  });
  FURN.forEach(function(f){
    var r=ROOMS[f[4]];
    m.drawImage(IMGS.interiors,f[0]*T,f[1]*T,f[2]*T,f[3]*T,r.x+f[5]*T,r.y+2*T+f[6]*T,f[2]*T,f[3]*T);
  });
}

function glowAt(x,y,radius,r,g,b,a){
  var gr=ctx.createRadialGradient(x,y,0,x,y,radius);
  gr.addColorStop(0,'rgba('+r+','+g+','+b+','+a+')');
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;
  ctx.fillRect(x-radius,y-radius,radius*2,radius*2);
}
function neonText(text,x,y,color,size){
  ctx.font='bold '+size+'px Courier New';
  ctx.textAlign='center';
  ctx.shadowColor=color; ctx.shadowBlur=14;
  ctx.fillStyle=color;
  ctx.fillText(text,x,y);
  ctx.shadowBlur=0;
}
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }
function shade(hex,amt){
  var c=parseInt(hex.slice(1),16);
  var r=Math.max(0,Math.min(255,(c>>16)+amt)), g=Math.max(0,Math.min(255,((c>>8)&255)+amt)), b=Math.max(0,Math.min(255,(c&255)+amt));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

function drawCharSprite(a){
  var moving=Math.abs(a.tx-a.x)+Math.abs(a.ty-a.y)>2;
  var sheetName=CHAR_SHEET[a.name];
  var x=a.x, y=a.y;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(x,y+14,8,3,0,0,Math.PI*2); ctx.fill();

  if(sheetName && IMGS[sheetName] && IMGS[sheetName].naturalWidth){
    // direction: 0=right,1=up,2=left,3=down
    var dx=a.tx-a.x, dy=a.ty-a.y, dir=3;
    if(moving){
      if(Math.abs(dx)>Math.abs(dy)) dir=dx>0?0:2;
      else dir=dy>0?3:1;
    }
    var f=moving?(Math.floor(frame/7)%6):0;
    var sx=(dir*6+f)*16;
    ctx.drawImage(IMGS[sheetName],sx,0,16,32,Math.round(x-8),Math.round(y-22),16,32);
  } else if(a.role==='Pet'){
    var bob=Math.sin(frame*0.08+a.walkPhase)*0.8, by=y+bob;
    px(x-9,by-2,18,10,a.body);
    px(x-8,by+2,16,6,'#f8e8d0');
    px(x-13,by-4,5,6,a.body);
    px(x+4,by-10,10,9,a.body);
    px(x+5,by-13,3,4,a.body); px(x+11,by-13,3,4,a.body);
    px(x+6,by-7,2,2,'#1a0e0a'); px(x+11,by-7,2,2,'#1a0e0a');
    px(x+8,by-4,3,2,'#1a0e0a');
    px(x-6,by+8,3,5,shade(a.body,-20)); px(x+3,by+8,3,5,shade(a.body,-20));
  } else {
    // robot Astra
    var bob2=Math.sin(frame*0.08+a.walkPhase)*0.8, by2=y+bob2;
    px(x-7,by2-6,14,15,a.body);
    px(x-6,by2-4,12,4,shade(a.body,20));
    px(x-6,by2-17,12,11,'#4a6a9a');
    px(x-4,by2-14,8,4,'#4ee8e0');
    glowAt(x,by2-12,14,78,232,224,0.2);
    px(x-1,by2-21,2,4,'#8ab0d8'); px(x-2,by2-23,4,2,'#f0604a');
    px(x-6,by2+9,4,5,'#2a3a52'); px(x+2,by2+9,4,5,'#2a3a52');
  }

  // name tag
  ctx.font='bold 10px Courier New';
  var nw=ctx.measureText(a.name).width+10;
  ctx.fillStyle='rgba(5,6,10,0.9)';
  ctx.fillRect(x-nw/2,y+17,nw,13);
  ctx.fillStyle=a.hair;
  ctx.textAlign='center';
  ctx.fillText(a.name,x,y+27);

  // bubble
  if(a.bubble&&a.bubbleTimer>0){
    ctx.fillStyle='rgba(240,240,248,0.95)';
    ctx.fillRect(x+10,y-40,24,20);
    ctx.beginPath(); ctx.moveTo(x+14,y-20); ctx.lineTo(x+10,y-13); ctx.lineTo(x+21,y-20); ctx.fill();
    ctx.font='12px sans-serif';
    ctx.fillText(a.bubble,x+22,y-25);
  }
}

function renderOffice(){
  frame++;
  ctx.fillStyle='#05060a'; ctx.fillRect(0,0,cv.width,cv.height);
  if(assetsReady) ctx.drawImage(mapCanvas,0,0);
  // night mood overlay
  ctx.fillStyle='rgba(8,8,22,0.32)';
  ctx.fillRect(0,0,cv.width,cv.height);
  // ambient glows
  GLOWS.forEach(function(g){
    var r=ROOMS[g[0]];
    glowAt(r.x+g[1],r.y+g[2],g[3],g[4],g[5],g[6],g[7]);
  });
  // blinking server LEDs on lockers
  var sr=ROOMS['Server Room'];
  for(var rack=0;rack<5;rack++){
    for(var led=0;led<4;led++){
      var blink=(frame/10+rack*2+led*3)%12;
      if(blink<6) px(sr.x+(2+rack*3)*T+4, sr.y+2*T+8+led*10, 3,2, led%2?'#5ae87a':'#5a9af0');
    }
  }
  // neon signs
  neonText('COFFEE',ROOMS['Breakroom'].x+120,ROOMS['Breakroom'].y+52,'#f06ab8',18);
  neonText('ASTRA',ROOMS['Lounge'].x+230,ROOMS['Lounge'].y+52,'#f06ab8',20);
  // room labels
  LOC_KEYS.forEach(function(k){
    var r=ROOMS[k];
    ctx.font='bold 11px Courier New';
    var lw=ctx.measureText(r.icon+' '+r.label).width+14;
    ctx.fillStyle='rgba(5,6,10,0.85)';
    ctx.fillRect(r.x+6,r.y+6,lw,18);
    ctx.strokeStyle='#2a3245'; ctx.lineWidth=1;
    ctx.strokeRect(r.x+6.5,r.y+6.5,lw-1,17);
    ctx.fillStyle='#d8e0ea';
    ctx.textAlign='left';
    ctx.fillText(r.icon+' '+r.label,r.x+13,r.y+19);
  });
  // agents
  state.agents.forEach(function(a){
    a.x+=(a.tx-a.x)*0.04;
    a.y+=(a.ty-a.y)*0.04;
    if(a.bubbleTimer>0)a.bubbleTimer--;
  });
  state.agents.slice().sort(function(p,q){return p.y-q.y;}).forEach(drawCharSprite);
  requestAnimationFrame(renderOffice);
}

// ═══════════════ PANEL RENDER ═══════════════
function faceDataURL(a){
  var c=document.createElement('canvas'); c.width=12; c.height=12;
  var x2=c.getContext('2d');
  x2.fillStyle='#12161f'; x2.fillRect(0,0,12,12);
  if(a.role==='Pet'){
    x2.fillStyle=a.body; x2.fillRect(2,4,8,7);
    x2.fillRect(2,2,2,3); x2.fillRect(8,2,2,3);
    x2.fillStyle='#1a0e0a'; x2.fillRect(4,6,1,2); x2.fillRect(7,6,1,2);
  } else if(a.role==='AI Core'){
    x2.fillStyle=a.body; x2.fillRect(2,3,8,8);
    x2.fillStyle='#4ee8e0'; x2.fillRect(3,5,6,2);
  } else {
    x2.fillStyle=a.skin; x2.fillRect(2,4,8,7);
    x2.fillStyle=a.hair; x2.fillRect(2,1,8,4);
    x2.fillStyle='#141018'; x2.fillRect(4,7,1,1); x2.fillRect(7,7,1,1);
  }
  return c.toDataURL();
}

function renderAgents(){
  document.getElementById('agentList').innerHTML=state.agents.map(function(a){
    var extra = a.role==='Pet' && a.currentAction.indexOf('sleep')!==-1 ? ' 💤' : '';
    return '<div class="agent-row">'+
      '<img class="agent-face" src="'+faceDataURL(a)+'" style="border:1px solid '+a.hair+';">'+
      '<div class="ar-body">'+
        '<div class="ar-name" style="color:'+a.hair+';">'+a.name+'</div>'+
        '<div class="ar-status">'+a.currentAction+extra+'</div>'+
        '<div class="ar-barwrap"><div class="ar-bar"><div class="ar-fill" style="width:'+a.mood+'%;"></div></div><span class="ar-pct">'+a.mood+'%</span></div>'+
      '</div></div>';
  }).join('');
}

function segBars(id,val,cls){
  var el=document.getElementById(id);
  var n=Math.round(val/20);
  var h='';
  for(var i=0;i<5;i++) h+='<span class="seg '+(i<n?'on '+cls:'')+'"></span>';
  el.innerHTML=h;
}

function renderTop(){
  var h=String(state.hour).padStart(2,'0');
  document.getElementById('dayOut').textContent=state.day;
  document.getElementById('timeOut').textContent=h+':00';
  document.getElementById('dayIcon').textContent=(state.hour>=6&&state.hour<18)?'☀️':'🌙';
  document.getElementById('hAgents').textContent=state.agents.length+'/10';
  document.getElementById('hTasks').textContent=state.tasks;
  document.getElementById('hGpu').textContent=state.gpu;
  document.getElementById('hPower').textContent=state.power;
  segBars('gpuSeg',state.gpu,'cyan');
  segBars('powerSeg',state.power,'amber');
  document.getElementById('fCredits').textContent=state.credits.toLocaleString();
  document.getElementById('fUptime').textContent=(state.day-1)+'D '+state.hour+'H';
  var st=document.getElementById('fStatus');
  if(state.happiness>=70){ st.textContent='😊 GOOD'; st.style.color='var(--green)'; }
  else if(state.happiness>=40){ st.textContent='😐 OKAY'; st.style.color='var(--amber)'; }
  else { st.textContent='😟 LOW'; st.style.color='var(--red)'; }
}

function renderLog(){
  document.getElementById('logBox').innerHTML=state.log.slice().reverse().map(function(e){
    return '<div class="log-line"><span class="log-time">['+e.time+']</span> <span class="log-name" style="color:'+e.color+';">'+e.who+'</span> '+e.text+'</div>';
  }).join('');
}

function renderAll(){ renderTop(); renderAgents(); renderLog(); }

// ═══════════════ UTILS ═══════════════
function pushLog(who,color,text){
  var h=String(state.hour).padStart(2,'0');
  var m=String(Math.floor(Math.random()*60)).padStart(2,'0');
  state.log.push({time:h+':'+m,who:who,color:color,text:text});
  if(state.log.length>50) state.log=state.log.slice(-50);
}
function toast(msg,type){
  var box=document.getElementById('toasts');
  var el=document.createElement('div');
  el.className='toast '+(type||'');
  el.textContent=msg;
  box.appendChild(el);
  setTimeout(function(){ el.style.transition='opacity 0.4s'; el.style.opacity='0'; setTimeout(function(){box.removeChild(el);},400); },3000);
}
function setStatus(t,show){
  var el=document.getElementById('aiStatus');
  el.style.display=(show===false)?'none':'block';
  if(t) el.textContent=t;
}
function setPlaying(p){
  state.playing=p;
  document.getElementById('playBtn').classList.toggle('active',p);
  document.getElementById('pauseBtn').classList.toggle('active',!p);
  if(timer) clearInterval(timer);
  if(p){ timer=setInterval(function(){ if(aiMode) callAI(); else tick(); }, aiMode?Math.max(5000,2200/state.speed):2200/state.speed); }
}

// ═══════════════ EVENTS ═══════════════
document.getElementById('pauseBtn').addEventListener('click',function(){setPlaying(false);});
document.getElementById('playBtn').addEventListener('click',function(){setPlaying(true);});
document.getElementById('speedBtn').addEventListener('click',function(){
  state.speed=state.speed>=4?1:state.speed*2;
  document.getElementById('speedTag').textContent=state.speed+'×';
  if(state.playing) setPlaying(true);
});
document.getElementById('resetBtn').addEventListener('click',function(){setPlaying(false);reset();setPlaying(true);});
document.getElementById('eventBtn').addEventListener('click',function(){
  var v=document.getElementById('eventInput').value.trim();
  if(!v) return;
  state.pendingEvent=v;
  document.getElementById('eventInput').value='';
  toast('⚡ Queued: '+v,'amber');
});
document.getElementById('eventInput').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('eventBtn').click(); });
document.getElementById('aiModeBtn').addEventListener('click',function(){
  aiMode=!aiMode;
  this.textContent=aiMode?'🟢 AI ACTIVE':'🧠 Use real AI';
  this.className=aiMode?'btn ai-on':'btn outline';
  setStatus(aiMode?'Real AI on — each tick calls Claude via /api/tick':'',aiMode);
  if(state.playing) setPlaying(true);
});

// ═══════════════ BOOT ═══════════════
reset();
renderOffice();
setPlaying(true);
</script>
